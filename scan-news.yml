name: 기사 신호 자동 분석

on:
  schedule:
    # 매일 오전 8시(KST, UTC 기준 23시 전날)에 실행
    - cron: '0 23 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 뉴스 수집 및 신호 분석
        run: python scripts/fetch_news.py

      - name: 변경사항 커밋
        run: |
          git config user.name "news-bot"
          git config user.email "bot@users.noreply.github.com"
          git add news_signals.json
          git diff --cached --quiet || git commit -m "chore: 기사 신호 갱신 $(date +%Y-%m-%d)"
          git push
