<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>경기 국면 대시보드</title>
<style>
  :root{
    --bg:#10151C; --panel:#161D27; --panel2:#1C2430; --line:#2A3341;
    --text:#EDEAE2; --sub:#8B93A1; --mute:#5B6472;
    --gold:#D8A34C; --teal:#4C9A8C; --rose:#B5654A; --slate:#6B7280;
    --up:#7FB37A; --down:#C97C6B;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; background:var(--bg); color:var(--text);
    font-family:'Segoe UI',-apple-system,'Malgun Gothic',sans-serif;
    padding:36px 28px 60px; min-height:100vh;
  }
  .wrap{max-width:1180px;margin:0 auto;}
  .eyebrow{font-size:12px;letter-spacing:.18em;color:var(--gold);text-transform:uppercase;margin:0 0 6px;font-weight:600;}
  h1{font-family:Georgia,'Times New Roman',serif;font-size:32px;margin:0 0 4px;font-weight:600;letter-spacing:-.01em;}
  .sub{color:var(--sub);font-size:13.5px;margin:0 0 32px;}

  .hero{
    display:grid; grid-template-columns:1fr; gap:20px;
    background:var(--panel); border:1px solid var(--line); border-radius:16px;
    padding:28px 32px; margin-bottom:28px;
  }
  .cycle-box{width:100%;}
  .cycle-box svg{width:100%;height:auto;display:block;}
  .cycle-head{display:flex;justify-content:space-between;align-items:baseline;flex-wrap:wrap;gap:8px;margin-bottom:6px;}
  .wheel-phase{font-family:Georgia,serif;font-size:24px;font-weight:700;}
  .wheel-sub{font-size:12.5px;color:var(--sub);}
  .emotion-now{font-size:12.5px;color:var(--gold);}

  .hero-right{display:flex;flex-direction:column;gap:14px;}
  .verdict-row{display:flex;gap:10px;flex-wrap:wrap;}
  .chip{
    font-size:12px; padding:6px 12px; border-radius:20px; border:1px solid var(--line);
    color:var(--sub); background:var(--panel2);
  }
  .chip b{color:var(--text);font-weight:600;}
  .chip.up{border-color:rgba(127,179,122,.4);color:var(--up);}
  .chip.down{border-color:rgba(201,124,107,.4);color:var(--down);}
  .chip.mix{border-color:rgba(216,163,76,.4);color:var(--gold);}
  .note{font-size:13px; color:var(--sub); line-height:1.6; border-left:3px solid var(--gold); padding-left:14px;}

  .grid6{display:grid;grid-template-columns:repeat(6,1fr);gap:14px;margin-bottom:28px;}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:16px 14px;}
  .card .tag{font-size:10.5px;color:var(--mute);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px;}
  .card .name{font-size:13px;color:var(--sub);margin-bottom:10px;}
  .card .val{font-family:'Courier New',monospace;font-size:22px;font-weight:700;}
  .card .delta{font-size:12px;margin-top:6px;font-family:'Courier New',monospace;}
  .card svg{width:100%;height:34px;margin-top:10px;}
  .card{cursor:pointer;transition:border-color .15s, transform .15s;}
  .card:hover{border-color:var(--gold);transform:translateY(-2px);}
  .card.active{border-color:var(--gold);box-shadow:0 0 0 1px var(--gold) inset;}
  .lead{border-top:3px solid var(--teal);}
  .coin{border-top:3px solid var(--gold);}
  .lag{border-top:3px solid var(--rose);}

  .detail{
    background:var(--panel);border:1px solid var(--line);border-radius:16px;
    padding:26px; margin-bottom:28px; display:none;
  }
  .detail.show{display:block;}
  .detail-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;flex-wrap:wrap;gap:10px;}
  .detail-title{font-family:Georgia,serif;font-size:19px;font-weight:700;}
  .detail-title span{color:var(--sub);font-size:12px;font-weight:400;margin-left:8px;}
  .range-toggle{display:flex;gap:6px;}
  .range-btn{
    font-size:12px;padding:6px 14px;border-radius:8px;border:1px solid var(--line);
    background:var(--panel2);color:var(--sub);cursor:pointer;
  }
  .range-btn.active{border-color:var(--gold);color:var(--gold);}
  .detail-chart-wrap{width:100%;overflow-x:auto;}
  .detail svg text{fill:var(--mute);font-size:10px;font-family:'Courier New',monospace;}
  .detail svg .gridline{stroke:var(--line);stroke-width:1;}
  .detail svg .valueline{fill:none;stroke-width:2.4;}
  .detail-close{font-size:12px;color:var(--mute);cursor:pointer;}
  .detail-close:hover{color:var(--text);}

  .two-col{display:grid;grid-template-columns:1.15fr .85fr;gap:20px;}
  .panel{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:26px;}
  .panel h2{font-family:Georgia,serif;font-size:18px;margin:0 0 18px;font-weight:600;}

  table{width:100%;border-collapse:collapse;font-size:13px;}
  th,td{text-align:left;padding:9px 8px;border-bottom:1px solid var(--line);}
  th{color:var(--mute);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.05em;}
  tr.current td{background:rgba(216,163,76,.08);}
  tr.current td:first-child{color:var(--gold);font-weight:700;}
  .arrow-up{color:var(--up);} .arrow-down{color:var(--down);} .arrow-mix{color:var(--gold);}

  .menu-item{display:flex;justify-content:space-between;gap:10px;padding:9px 0;border-bottom:1px solid var(--line);font-size:13px;}
  .menu-item:last-child{border-bottom:none;}
  .menu-item .cat{color:var(--sub);min-width:74px;}
  .menu-item .val{color:var(--text);text-align:right;}

  .foot{margin-top:28px;font-size:11.5px;color:var(--mute);text-align:center;}
</style>
</head>
<body>
<div class="wrap">
  <p class="eyebrow">Market Phase Tracker</p>
  <h1>경기 국면 대시보드</h1>
  <p class="sub">선행·동행·후행 6개 지표 기반 국면 판정 · <span id="asOf"></span> 기준</p>

  <div class="hero">
    <div class="cycle-box">
      <div class="cycle-head">
        <div>
          <span class="wheel-phase" id="phaseName"></span>
          <span class="wheel-sub" id="phaseSub"></span>
        </div>
        <div class="emotion-now" id="emotionNow"></div>
      </div>
      <svg id="cycleCurve" viewBox="0 0 900 300" preserveAspectRatio="xMidYMid meet"></svg>
    </div>
    <div class="hero-right">
      <div class="verdict-row" id="verdictRow"></div>
      <div class="note" id="noteText"></div>
    </div>
  </div>

  <div class="grid6" id="cardGrid"></div>

  <div class="detail" id="detailPanel">
    <div class="detail-head">
      <div class="detail-title" id="detailTitle">지표명 <span id="detailRangeLabel"></span></div>
      <div style="display:flex;align-items:center;gap:16px;">
        <div class="range-toggle" id="rangeToggle">
          <button class="range-btn" data-range="36">3년</button>
          <button class="range-btn" data-range="60">5년</button>
          <button class="range-btn" data-range="9999">전체</button>
        </div>
        <div class="detail-close" id="detailClose">닫기 ✕</div>
      </div>
    </div>
    <div class="detail-chart-wrap"><svg id="detailChart" width="100%" height="240"></svg></div>
  </div>

  <div class="two-col">
    <div class="panel">
      <h2>4국면 판정 매트릭스</h2>
      <table>
        <thead><tr><th>국면</th><th>선행</th><th>동행</th><th>후행</th><th>대응</th></tr></thead>
        <tbody id="matrixBody"></tbody>
      </table>
    </div>
    <div class="panel">
      <h2 id="menuTitle">이번 국면 메뉴판</h2>
      <div id="menuList"></div>
    </div>
  </div>

  <p class="foot">지표 카드를 클릭하면 3년/5년/전체 추이를 볼 수 있어요 · records 배열은 data.json에서 자동 로드됩니다 · 한약살롱 시장지표 대시보드</p>
</div>

<script>
/* data.json을 자동으로 읽어옵니다. GitHub Actions가 매월 이 파일을 갱신합니다.
   PMI만 ISM 발표 후 data.json에서 직접 수동으로 채워주세요.
   fetch가 실패하면(예: file://로 로컬에서 그냥 열었을 때) 아래 FALLBACK 데이터로 표시됩니다. */
const FALLBACK_RECORDS = [
  {m:"2026-04", stock:7511, pmi:54.5, ip:1.4, retail:4.8, gdp:2.0, unemp:4.3},
  {m:"2026-05", stock:7447, pmi:55.1, ip:1.7, retail:6.9, gdp:2.7, unemp:4.3},
];

async function loadRecords(){
  try{
    const res = await fetch('data.json', {cache:'no-store'});
    if(!res.ok) throw new Error('fetch failed');
    const data = await res.json();
    if(!Array.isArray(data) || data.length < 2) throw new Error('invalid data');
    return data;
  }catch(e){
    console.warn('data.json 로드 실패, 예시 데이터로 표시합니다:', e.message);
    return FALLBACK_RECORDS;
  }
}

const phaseInfo = {
  "회복": {color:"var(--teal)", desc:"위험자산 선호(진입)"},
  "성장": {color:"var(--gold)", desc:"위험자산 수익실현(끝물 주의)"},
  "둔화": {color:"var(--rose)", desc:"위험자산 분할 매수(역발상 축적)"},
  "침체": {color:"var(--slate)", desc:"위험자산 포지션 완료"},
  "국면전환 관찰중": {color:"var(--gold)", desc:"방향 혼재 · 다음 달 재확인"}
};

const matrix = [
  {phase:"회복", lead:"반등 ↗", coin:"바닥 〰", lag:"하락 ↘"},
  {phase:"성장", lead:"상승 ↗", coin:"상승 ↗", lag:"상승 ↗"},
  {phase:"둔화", lead:"하락 ↘", coin:"전환 ↻", lag:"상승 ↗"},
  {phase:"침체", lead:"하락 ↘", coin:"하락 ↘", lag:"하락 ↘"},
];

const menus = {
  "회복": [["업종","IT(S/W·반도체), 커뮤니케이션, 자유소비재, 운송"],["지수","나스닥 > S&P500"],["스타일","대형성장주"],["환율","USD 우위"]],
  "성장": [["업종","금융, 산업재, 자유소비재, 헬스케어, 에너지·소재"],["지역","EM 선호, Non-US > US"],["스타일","시클리컬, 중소형주"],["환율","USD 약세"]],
  "둔화": [["업종","통신, 헬스케어(제약), 필수소비재, 유틸리티"],["지수","다우 > S&P500 > 나스닥"],["스타일","배당·방어·가치주"],["환율","USD 강세"]],
  "침체": [["업종","메가캡, 유틸리티, 통신"],["스타일","방어주·퀄리티"],["환율","USD 초강세"],["안전자산","장기채(TLT), 금(GLD)"]],
  "국면전환 관찰중": [["안내","지표 방향이 아직 섞여 있어요"],["행동","다음 달 데이터로 재확인 후 메뉴 확정"],["참고","선행지표 방향에 가장 먼저 주목"],["", ""]],
};

function dir(curr, prev, invert=false){
  if(curr==null||prev==null) return null;
  if(invert){ [curr,prev]=[prev,curr]; }
  if(curr>prev) return "up"; if(curr<prev) return "down"; return "mix";
}
function judge(a,b){
  if(a==="up"&&b==="up") return "상승"; if(a==="down"&&b==="down") return "하락"; return "혼조";
}

(async function render(){
const records = await loadRecords();
const last = records[records.length-1], prev = records[records.length-2];
const leadStock = dir(last.stock, prev.stock);
const leadPmi = dir(last.pmi, prev.pmi);
const coinIp = dir(last.ip, prev.ip);
const coinRetail = dir(last.retail, prev.retail);
const lagGdp = dir(last.gdp, prev.gdp);
const lagUnemp = dir(last.unemp, prev.unemp, true); // 실업률은 낮아지는게 개선

const leadJ = judge(leadStock, leadPmi);
const coinJ = judge(coinIp, coinRetail);
const lagJ = judge(lagGdp, lagUnemp);

let phase = "국면전환 관찰중";
if(leadJ==="상승"&&coinJ==="상승"&&lagJ==="상승") phase="성장";
else if(leadJ==="하락"&&coinJ==="하락"&&lagJ==="하락") phase="침체";
else if(leadJ==="상승"&&coinJ==="혼조"&&lagJ==="하락") phase="회복";
else if(leadJ==="하락"&&coinJ==="혼조"&&lagJ==="상승") phase="둔화";

document.getElementById("asOf").textContent = last.m;
document.getElementById("phaseName").textContent = phase;
document.getElementById("phaseName").style.color = phaseInfo[phase].color;
document.getElementById("phaseSub").textContent = phaseInfo[phase].desc;

function chip(label, dirVal, judgeVal){
  const cls = judgeVal==="상승"?"up":judgeVal==="하락"?"down":"mix";
  return `<div class="chip ${cls}">${label} <b>${judgeVal}</b></div>`;
}
document.getElementById("verdictRow").innerHTML =
  chip("선행", leadJ, leadJ) + chip("동행", coinJ, coinJ) + chip("후행", lagJ, lagJ);

document.getElementById("noteText").textContent =
  phase==="국면전환 관찰중"
   ? "선행·동행·후행 판정이 완전히 일치하지 않아요. 성장 국면 끄트머리엔 후행지표만 좋다는 기사에 속기 쉬우니, 선행지표(주가·PMI) 방향을 우선 신뢰하고 다음 달 데이터로 재확인하세요."
   : `현재 판정은 ${phase} 국면입니다. 대응: ${phaseInfo[phase].desc}`;

/* 6개 카드 */
const cardsDef = [
  {key:"stock", label:"주가 (S&P500)", tag:"선행", cls:"lead", fmt:v=>v.toLocaleString()},
  {key:"pmi", label:"제조업 PMI", tag:"선행", cls:"lead", fmt:v=>v.toFixed(1)},
  {key:"ip", label:"산업생산 YoY", tag:"동행", cls:"coin", fmt:v=>v.toFixed(1)+"%"},
  {key:"retail", label:"소매판매 YoY", tag:"동행", cls:"coin", fmt:v=>v.toFixed(1)+"%"},
  {key:"gdp", label:"GDP 성장률 YoY", tag:"후행", cls:"lag", fmt:v=>v.toFixed(1)+"%"},
  {key:"unemp", label:"실업률", tag:"후행", cls:"lag", fmt:v=>v.toFixed(1)+"%"},
];
const grid = document.getElementById("cardGrid");
cardsDef.forEach(c=>{
  const cur = last[c.key], pv = prev[c.key];
  const hasCur = cur!=null, hasPv = pv!=null;
  const delta = (hasCur && hasPv) ? cur - pv : null;
  const invert = c.key==="unemp";
  const better = delta!=null ? (invert ? delta<0 : delta>0) : null;
  const deltaCls = delta==null ? "" : (delta===0?"":( better?"arrow-up":"arrow-down"));
  const arrow = delta==null ? "" : (delta===0?"→":(better?"▲":"▼"));
  const deltaText = delta==null ? "발표 대기" : `${arrow} ${Math.abs(delta).toFixed(1)} (전월비)`;
  const valText = hasCur ? c.fmt(cur) : "—";
  const pts = records.map(r=>r[c.key]).filter(v=>v!=null);
  let poly = "";
  if(pts.length){
    const min=Math.min(...pts), max=Math.max(...pts), span=(max-min)||1;
    const w=100,h=30, step = pts.length>1 ? w/(pts.length-1) : 0;
    poly = pts.map((v,i)=> `${i*step},${h-((v-min)/span)*h}`).join(" ");
  }
  grid.innerHTML += `
    <div class="card ${c.cls}" data-key="${c.key}" data-label="${c.label}" data-cls="${c.cls}">
      <div class="tag">${c.tag}</div>
      <div class="name">${c.label}</div>
      <div class="val">${valText}</div>
      <div class="delta ${deltaCls}">${deltaText}</div>
      <svg viewBox="0 0 100 30" preserveAspectRatio="none"><polyline points="${poly}" fill="none" stroke="currentColor" stroke-width="2"/></svg>
    </div>`;
});

/* 매트릭스 테이블 */
const mb = document.getElementById("matrixBody");
matrix.forEach(m=>{
  const cur = m.phase===phase ? "current" : "";
  mb.innerHTML += `<tr class="${cur}"><td>${m.phase}</td><td>${m.lead}</td><td>${m.coin}</td><td>${m.lag}</td><td>${phaseInfo[m.phase].desc}</td></tr>`;
});

/* 메뉴판 */
document.getElementById("menuTitle").textContent = `${phase} 국면 메뉴판`;
const ml = document.getElementById("menuList");
menus[phase].forEach(([cat,val])=>{
  if(!cat) return;
  ml.innerHTML += `<div class="menu-item"><div class="cat">${cat}</div><div class="val">${val}</div></div>`;
});

/* ── 감정 사이클 곡선 (필기 프레임: 회복→성장→둔화→침체 + 감정 라벨) ── */
(function drawCycleCurve(){
  const svg = document.getElementById("cycleCurve");
  const W=900, H=300, padX=30, baseY=160, amp=95;
  const phaseColors = {"회복":"#4C9A8C","성장":"#D8A34C","둔화":"#B5654A","침체":"#6B7280"};

  // 곡선: 저점(t=0, 회복 시작) → 고점(t=0.5, 성장 끝) → 저점(t=1, 침체 끝)
  // cos(0)=1(아래=저점), cos(π)=-1(위=고점), cos(2π)=1(아래=저점)
  const Y = t => baseY + amp * Math.cos(2 * Math.PI * t);
  const X = t => padX + t * (W - padX*2);

  // 국면 경계: 회복 0~0.25, 성장 0.25~0.5, 둔화 0.5~0.75, 침체 0.75~1
  const phases = [
    {name:"회복", from:0, to:0.28},
    {name:"성장", from:0.28, to:0.5},
    {name:"둔화", from:0.5, to:0.75},
    {name:"침체", from:0.75, to:1},
  ];

  // 감정 라벨 (필기 순서): 저점부터 시작
  const emotions = [
    {t:0.02, label:"우울"}, {t:0.09, label:"희망"}, {t:0.16, label:"안도"},
    {t:0.24, label:"낙관"}, {t:0.32, label:"흥분"}, {t:0.40, label:"스릴"},
    {t:0.485, label:"희열"},
    {t:0.56, label:"불안"}, {t:0.62, label:"부정"}, {t:0.68, label:"공포"},
    {t:0.74, label:"절망"}, {t:0.80, label:"패닉"}, {t:0.87, label:"항복"},
    {t:0.95, label:"우울"},
  ];

  // 현재 위치: 국면 + 판정 조합으로 t 결정
  const phaseCenter = {"회복":0.14, "성장":0.39, "둔화":0.625, "침체":0.875};
  let posT, posRange = 0;
  if(phase in phaseCenter){
    posT = phaseCenter[phase];
  } else {
    // 국면전환 관찰중: 선행 방향으로 추정 위치, 범위 넓게 표시
    if(leadJ==="상승" && lagJ!=="하락") posT = 0.44;      // 성장 후반 추정
    else if(leadJ==="하락") posT = 0.55;                    // 둔화 초입 추정
    else posT = 0.47;
    posRange = 0.09; // 불확실 범위
  }

  let html = "";
  // 국면 밴드 배경
  phases.forEach(p=>{
    html += `<rect x="${X(p.from)}" y="20" width="${X(p.to)-X(p.from)}" height="${H-60}"
      fill="${phaseColors[p.name]}" opacity="${p.name===phase?0.14:0.05}"/>`;
    html += `<text x="${(X(p.from)+X(p.to))/2}" y="${H-18}" text-anchor="middle"
      fill="${p.name===phase?phaseColors[p.name]:'#5B6472'}" font-size="14" font-weight="${p.name===phase?700:400}">${p.name}</text>`;
  });
  // 국면 경계선
  phases.slice(1).forEach(p=>{
    html += `<line x1="${X(p.from)}" y1="20" x2="${X(p.from)}" y2="${H-40}" stroke="#2A3341" stroke-dasharray="4 4"/>`;
  });

  // 곡선
  const pts = [];
  for(let i=0;i<=200;i++){ const t=i/200; pts.push(`${X(t)},${Y(t)}`); }
  html += `<polyline points="${pts.join(" ")}" fill="none" stroke="#8B93A1" stroke-width="2.5" opacity="0.9"/>`;

  // 감정 라벨: 곡선 위/아래 번갈아 배치, 고점 부근은 위쪽
  emotions.forEach(e=>{
    const ex=X(e.t), ey=Y(e.t);
    const above = ey < baseY; // 곡선이 위쪽(고점권)이면 라벨은 더 위
    const ly = above ? ey - 16 : ey + 22;
    const isPeak = e.label==="희열";
    html += `<circle cx="${ex}" cy="${ey}" r="3" fill="#5B6472"/>`;
    html += `<text x="${ex}" y="${ly}" text-anchor="middle" font-size="12"
      fill="${isPeak?'#C97C6B':'#8B93A1'}" font-weight="${isPeak?700:400}">${e.label}</text>`;
  });

  // 현재 위치 (불확실 범위 표시)
  if(posRange>0){
    const rp=[]; 
    for(let i=0;i<=40;i++){ const t=posT-posRange+(i/40)*posRange*2; rp.push(`${X(t)},${Y(t)}`); }
    html += `<polyline points="${rp.join(" ")}" fill="none" stroke="#D8A34C" stroke-width="7" opacity="0.35" stroke-linecap="round"/>`;
  }
  const px=X(posT), py=Y(posT);
  html += `<circle cx="${px}" cy="${py}" r="11" fill="#D8A34C" opacity="0.25">
      <animate attributeName="r" values="9;15;9" dur="2.4s" repeatCount="indefinite"/>
    </circle>`;
  html += `<circle cx="${px}" cy="${py}" r="6" fill="#D8A34C" stroke="#10151C" stroke-width="2"/>`;
  html += `<text x="${px}" y="${py-22}" text-anchor="middle" font-size="13" font-weight="700" fill="#D8A34C">현재 위치${posRange>0?" (추정)":""}</text>`;

  svg.innerHTML = html;

  // 현재 감정 라벨 표시
  let nearest = emotions[0], best=1e9;
  emotions.forEach(e=>{ const d=Math.abs(e.t-posT); if(d<best){best=d; nearest=e;} });
  document.getElementById("emotionNow").textContent = `지금 시장 감정 근처: ${nearest.label}`;
})();

/* ── 카드 클릭 -> 3/5년/전체 추이 그래프 ── */
const cardColor = {lead:"#4C9A8C", coin:"#D8A34C", lag:"#B5654A"};
let currentKey = null, currentRange = 36;

function renderDetailChart(){
  if(!currentKey) return;
  const def = cardsDef.find(c=>c.key===currentKey);
  const all = records.filter(r=>r[currentKey]!=null);
  const slice = currentRange>=9999 ? all : all.slice(-currentRange);
  document.getElementById("detailTitle").innerHTML = `${def.label} <span>${slice[0]?.m || ''} ~ ${slice[slice.length-1]?.m || ''} · ${slice.length}개월</span>`;

  const svg = document.getElementById("detailChart");
  const W = Math.max(600, slice.length*14), H = 240, padL=54, padR=20, padT=16, padB=28;
  const vals = slice.map(r=>r[currentKey]);
  const min = Math.min(...vals), max = Math.max(...vals);
  const span = (max-min)||1;
  const x = i => padL + (slice.length>1 ? i*(W-padL-padR)/(slice.length-1) : 0);
  const y = v => padT + (H-padT-padB) - ((v-min)/span)*(H-padT-padB);

  let html = `<rect x="0" y="0" width="${W}" height="${H}" fill="transparent"/>`;
  [0,0.25,0.5,0.75,1].forEach(t=>{
    const yy = padT + t*(H-padT-padB);
    const v = max - t*span;
    html += `<line class="gridline" x1="${padL}" y1="${yy}" x2="${W-padR}" y2="${yy}"/>`;
    html += `<text x="4" y="${yy+3}">${v.toFixed(1)}</text>`;
  });
  const labelEvery = Math.ceil(slice.length/10);
  slice.forEach((r,i)=>{ if(i%labelEvery===0 || i===slice.length-1)
    html += `<text x="${x(i)}" y="${H-8}" text-anchor="middle">${r.m.slice(2)}</text>`;
  });
  const pts = slice.map((r,i)=>`${x(i)},${y(r[currentKey])}`).join(" ");
  html += `<polyline class="valueline" points="${pts}" stroke="${cardColor[def.cls]}"/>`;
  slice.forEach((r,i)=>{
    if(i===slice.length-1) html += `<circle cx="${x(i)}" cy="${y(r[currentKey])}" r="3.5" fill="${cardColor[def.cls]}"/>`;
  });
  svg.setAttribute("viewBox", `0 0 ${W} ${H}`);
  svg.setAttribute("height", H);
  svg.innerHTML = html;
}

document.getElementById("cardGrid").addEventListener("click", (e)=>{
  const card = e.target.closest(".card");
  if(!card) return;
  document.querySelectorAll(".card").forEach(c=>c.classList.remove("active"));
  const panel = document.getElementById("detailPanel");
  if(currentKey === card.dataset.key && panel.classList.contains("show")){
    panel.classList.remove("show"); currentKey = null; return;
  }
  card.classList.add("active");
  currentKey = card.dataset.key;
  panel.classList.add("show");
  renderDetailChart();
  panel.scrollIntoView({behavior:"smooth", block:"nearest"});
});

document.getElementById("rangeToggle").addEventListener("click",(e)=>{
  const btn = e.target.closest(".range-btn");
  if(!btn) return;
  document.querySelectorAll(".range-btn").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
  currentRange = parseInt(btn.dataset.range,10);
  renderDetailChart();
});
document.getElementById("detailClose").addEventListener("click",()=>{
  document.getElementById("detailPanel").classList.remove("show");
  document.querySelectorAll(".card").forEach(c=>c.classList.remove("active"));
  currentKey = null;
});
document.querySelector('.range-btn[data-range="36"]').classList.add("active");

})();

</script>
