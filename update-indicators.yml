name: 경기 지표 자동 갱신

on:
  schedule:
    # 매월 25일 오전 9시(KST, UTC 기준 0시)에 자동 실행
    - cron: '0 0 25 * *'
  workflow_dispatch: {}   # 수동 실행 버튼도 사용 가능

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 지표 수집
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python scripts/fetch_indicators.py

      - name: 변경사항 커밋
        run: |
          git config user.name "indicator-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data.json
          git diff --cached --quiet || git commit -m "chore: 경기지표 자동 갱신 $(date +%Y-%m)"
          git push
