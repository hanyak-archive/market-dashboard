name: 시장 로테이션 갱신

on:
  schedule:
    # 매주 월요일 오전 8시(KST, UTC 기준 일요일 23시)
    - cron: '0 23 * * 0'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  rotate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 상대강도 수집
        run: python scripts/fetch_markets.py

      - name: 변경사항 커밋
        run: |
          git config user.name "rotation-bot"
          git config user.email "bot@users.noreply.github.com"
          git add markets.json
          git diff --cached --quiet || git commit -m "chore: 시장 로테이션 갱신 $(date +%Y-%m-%d)"
          git pull --rebase origin main
          git push
